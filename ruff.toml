# Ruff configuration for Langfuse Skill
# https://docs.astral.sh/ruff/configuration/

# Target Python 3.11+
target-version = "py311"

# Line length matching common standards
line-length = 100

# Exclude common non-source directories
exclude = [
    ".git",
    ".venv",
    "venv",
    "__pycache__",
    ".pytest_cache",
    ".ruff_cache",
    "build",
    "dist",
    "*.egg-info",
]

[lint]
# Enable recommended rule sets
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # Pyflakes
    "I",      # isort
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "UP",     # pyupgrade
    "SIM",    # flake8-simplify
]

# Ignore specific rules that are too strict for this project
ignore = [
    "E501",   # line too long (handled by formatter)
    "B008",   # function call in default argument (common with Click)
]

[lint.isort]
known-first-party = ["lib"]

[format]
# Use double quotes for strings
quote-style = "double"

# Indent with spaces
indent-style = "space"

# Unix-style line endings
line-ending = "lf"
